<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TIX Turismo</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="styles/style.css" rel="stylesheet">
        <link rel="icon" type="image/jpg" href="./src/icon.jpg">
    </head>
    <body>
        <header class="navbar bg-light fixed-top"> 
            <div class="container">
                <a class="navbar-brand text-white d-flex flex-row gap-3" href="#planos">
                    <img src="./src/logo.png" alt="Logo" width="130" height="100" class="d-inline-block align-text-top">
                </a>
                <nav class="navbar-nav">
                    <ul class="nav">
                        <li class="nav-item"><a class="nav-link text-black" href="#planos">Planos de Viagens</a></li>
                        <li class="nav-item"><a class="nav-link text-black" href="#servicos">Serviços</a></li>
                        <li class="nav-item"><a class="nav-link text-black" href="#contatos">Contatos</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        <main>
            <section class="d-flex flex-column container align-items-center" id="planos">
                <h2>
                    Pacotes de Viagens:
                </h2>
                <div class="container text-center">
                    <div class="row">
                        <div class="col-5">
                            <img class="img-fluid rounded img-thumbnail h-100 w-100 object-fit-cover" src="./src/banner.png" alt="Qual é o seu plano de viagem? a tix vai te ajudar a transformar em realidade!">
                        </div>
                        <div class="col">
                            <a href="#contatos">
                                <img src="./src/Disney.jpg" class="rounded h-100 w-100 object-fit-cover" alt="Pacote de viagem disney parque aquático">
                            </a>
                        </div>
                        <div class="col">
                            <a href="#contatos">
                                <img src="./src/DisneyHalloween.jpg" class="rounded h-120 w-100 object-fit-cover" alt="Pacote de viagem Disney Halloween">
                            </a>
                        </div>
                        <div class="col">
                            <a href="#contatos">
                                <img src="./src/europa.jpg" class="rounded h-120 w-100 object-fit-cover" alt="Pacote de Viagem Europa">
                            </a>
                        </div>
                    </div>
                </div>
            </section>

            <section class="row justify-content-center" style="background-color: darkblue;" id="servicos">
                <h2 class="text-center text-white">
                    Outros Serviços:
                </h2>
                <div class="col">
                    <a href="#contatos">
                        <img class="img-fluid" src="./src/cambio-2.png" alt="cambio">
                    </a>  
                </div>
                <div class="col">
                    <a href="#contatos">
                        <img class="img-fluid" src="./src/chip-2.png" alt="chip">
                    </a>
                </div>
                <div class="col">
                    <a href="#contatos">
                        <img class="img-fluid" src="./src/ingressos-1.png" alt="ingressos">
                    </a>               
                </div>
                <div class="col">
                    <a href="#contatos">
                        <img class="img-fluid" src="./src/disney.png" alt="disney">
                    </a>
                </div>
                <div class="col">
                    <a href="#contatos">
                        <img class="img-fluid" src="./src/seguro-2.png" alt="seguro">
                    </a>
                </div>
                <div class="col">
                    <a href="#contatos">
                        <img class="img-fluid" src="./src/locacao-2.png" alt="locação">
                    </a>
                </div>
            </section>
            <section id="contatos">
                <section class="section full-screen" id="contact">
                    <h2>Contatos</h2>
                    <!-- Card para o Whatsapp -->
                    <div class="contact-card">
                        <img src="./src/wpicon.png" alt="WhatsApp" class="icon" />
                        <a href="#" target="_blank">Whatsapp: (11) 98824-8992</a>
                        <button onclick="window.open('https://api.whatsapp.com/send/?phone=5511988248992', '_blank')" class="contact-btn" id="contactbtn">Visitar</button>
                    </div>

                    <!-- Card para o Instagram -->
                    <div class="contact-card">
                        <img src="./src/instaicon.png" alt="Instagram" class="icon" />
                        <a href="#" target="_blank">Instagram</a>
                        <button onclick="window.open('https://www.instagram.com/tixturismoitatiba?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==', '_blank')" class="contact-btn" id="contactbtn">Visitar</button>
                    </div>

                    <!-- Card para Email -->
                    <div class="contact-card">
                        <img src="./src/email.png" alt="Email" class="icon" />
                        <span>tixitatiba@tixturismo.com.br</span>
                        <button onclick="copyEmail('tixitatiba@tixturismo.com.br')" class="contact-btn" id="emailbtn">Copiar</button>
                    </div>
                    <p>
                        De segunda à sexta: 09h00 ~ 18h00
                    </p>
                    <p>
                        Sábados: 09h00 ~ 13h00
                    </p>
                </section>
            </section>
        </main> 
        <footer class="py-3 bg-dark ">
            <p class="text-center text-white">© TIX Turismo: Especialista em Turismo</p>
        </footer>


        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script>
            //copiar email
            function copyEmail(email) {
                const contactbtn = document.getElementById('emailbtn');
                navigator.clipboard.writeText(email).then(() => {
                    contactbtn.innerText = "Copiado";
                    contactbtn.classList.add('copied');

                    // Retorna ao texto original após 2 segundos
                    setTimeout(() => {
                        contactbtn.innerText = "Copiar";
                        contactbtn.classList.remove('copied');
                    }, 2000);
                });
            }
            
        </script>
    </body>
</html>
